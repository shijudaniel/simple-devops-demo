name: CI Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Linter
        run: |
          flake8 .

      - name: Run Security Scan
        run: |
          bandit -r app

      - name: Run Tests
        run: |
          PYTHONPATH=. pytest

      - name: Build Docker Image
        run: |
          docker build -t devops-demo .